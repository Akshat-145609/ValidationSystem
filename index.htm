<script>

/* ===============================
VAULT DUPLICATE CHECK ENGINE
=============================== */

async function fetchVaultEntries(){

try{

let response = await fetch("vault/alpha-vault.json")

if(!response.ok) throw "Vault not reachable"

let vault = await response.json()

return vault.entries || []

}catch(e){

console.warn("Vault unavailable — duplicate check skipped")

return []

}

}


/* ===============================
SAFE UNIQUE ID GENERATOR
=============================== */

async function generateUniqueID(){

let entries = await fetchVaultEntries()

let id
let exists = true

while(exists){

id = "ANH-" +
Math.random()
.toString(36)
.substring(2,9)
.toUpperCase()

exists = entries.some(e => e.urlId === id)

}

return id

}


/* ===============================
URL DUPLICATE CHECK
=============================== */

async function isDuplicateURL(url){

let entries = await fetchVaultEntries()

return entries.some(e => e.url === url)

}

</script>

<script>

/* STEP FLOW */

function step2(){

document.getElementById("step1").classList.add("hidden")
document.getElementById("step2").classList.remove("hidden")

}

function step3(){

document.getElementById("step2").classList.add("hidden")
document.getElementById("step3").classList.remove("hidden")

}

function step4(){

document.getElementById("step3").classList.add("hidden")
document.getElementById("step4").classList.remove("hidden")

}

/* GENERATE UNIQUE ID */

function generateID(){

return "ANH-" +
Math.random()
.toString(36)
.substring(2,9)
.toUpperCase()

}


/* GENERATE OUTPUT */

async function generateScripts(){

let url=document.getElementById("url").value
let title=document.getElementById("title").value
let description=document.getElementById("description").value
let icon=document.getElementById("icon").value

if(!url || !title){

alert("URL and Title required")
return

}


/* CHECK DUPLICATE URL FIRST */

let duplicateURL = await isDuplicateURL(url)

if(duplicateURL){

alert("This URL already exists in alpha-vault.json")

return

}


/* GENERATE UNIQUE ID SAFELY */

let id = await generateUniqueID()


/* SAFE SCRIPT TAG BUILD */

let openTag='<scr'+'ipt class="Scripto">'
let closeTag='</scr'+'ipt>'


let scripto =

openTag + '\n\n' +

'window.ANH_ID="'+id+'"\n\n' +

'window.ANH_META={\n' +

'url:"'+url+'",\n' +
'title:"'+title+'",\n' +
'description:"'+description+'",\n' +
'icon:"'+icon+'"\n' +

'}\n\n' +

closeTag


let vault =

'{\n' +

'"urlId":"'+id+'",\n' +
'"url":"'+url+'",\n' +
'"title":"'+title+'",\n' +
'"description":"'+description+'",\n' +
'"icon":"'+icon+'",\n' +
'"tier":"TIER-1",\n' +
'"status":"active",\n' +
'"createdBy":"index.htm generator",\n' +
'"checksum":"AUTO_OPTIONAL",\n' +
'"lastVerified":"AUTO_RUNTIME"\n' +

'}'


document.getElementById("scriptoBlock").innerText = scripto
document.getElementById("vaultBlock").innerText = vault

document.getElementById("status").innerText =
"Unique vault entry generated successfully ✅"

}


/* COPY FUNCTIONS */

function copyScripto(){

navigator.clipboard.writeText(
document.getElementById("scriptoBlock").innerText
)

alert("Scripto copied")

}


function copyVault(){

navigator.clipboard.writeText(
document.getElementById("vaultBlock").innerText
)

alert("Vault JSON copied")

}


/* DOWNLOAD JSON */

function downloadJSON(){

let data=document.getElementById("vaultBlock").innerText

let blob=new Blob([data],
{type:"application/json"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="vault-entry.json"

link.click()

}
