<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Sessions</h3>

<div id="sessions"></div>

</div>


<!-- MAIN PANEL -->

<div class="main">

<h2>Current Validation Session</h2>

<div id="grid"
class="grid"></div>

<div id="summary"
class="summary"></div>

</div>


<script>

/* =====================================
INDEXEDDB INIT (sessions + bin_db SAFE)
===================================== */

let db;

let request = indexedDB.open(
"ANH_ANALYTICS_DB",
3
);

request.onupgradeneeded = e => {

db = e.target.result;

if(!db.objectStoreNames.contains("sessions")){
db.createObjectStore("sessions",{keyPath:"id"});
}

if(!db.objectStoreNames.contains("bin_db")){
db.createObjectStore("bin_db",{keyPath:"id"});
}

};

request.onsuccess = e => {

db = e.target.result;

boot();

};


/* =====================================
BOOT ENGINE
===================================== */

function boot(){

loadSessions();

loadVault();

}


/* =====================================
FETCH VAULT DATA
===================================== */

async function loadVault(){

let res =
await fetch(
"/ValidationSystem/vault/alpha-vault.json"
);

let vault =
await res.json();

analyze(vault.entries);

}


/* =====================================
VALIDATION ENGINE
===================================== */

async function analyze(entries){

let sessionID = Date.now();

let results = [];

let total = 0;

for(let site of entries){

let score = 0;

try{

let html =
await fetch(
site.url,
{mode:"cors"}
).then(r=>r.text());


if(html.includes(site.urlId)) score+=4;

if(html.includes(site.title)) score++;

if(html.includes(site.description)) score++;

if(html.includes("og:title")) score++;

if(html.includes("twitter:card")) score++;

if(html.includes("application/ld+json")) score++;

if(html.includes('rel="icon"')) score++;

}catch{}

results.push({

title:site.title,
url:site.url,
score

});

total += score;

}

render(results,total);

saveSession(sessionID,results,total);

}


/* =====================================
RENDER UI ENGINE
===================================== */

function render(results,total){

let html = "";

results.forEach(r=>{

let cls="bad";

if(r.score>=8) cls="good";
else if(r.score>=5) cls="mid";


html += `

<div class="card">

<b>${r.title}</b>

<div>
<a href="${r.url}" target="_blank">
Visit Project →
</a>
</div>

<div class="score ${cls}">
${r.score}/10
</div>

</div>

`;

});


document.getElementById("grid").innerHTML = html;


document.getElementById("summary").innerHTML =

"Consistency Accuracy: " +

Math.round(

(total/(results.length*10))*100

) + "%";

}


/* =====================================
SAVE SESSION
===================================== */

function saveSession(id,data,total){

let tx =
db.transaction(
["sessions","bin_db"],
"readwrite"
);

tx.objectStore("sessions").put({

id,
data,
total

});

tx.oncomplete = () => {

enforceSessionLimit();

loadSessions();

};

}


/* =====================================
LOAD SESSION LIST
===================================== */

function loadSessions(){

let tx =
db.transaction(
"sessions",
"readonly"
);

let store =
tx.objectStore("sessions");

let req =
store.getAll();

req.onsuccess = e => {

let sessions =
e.target.result
.sort((a,b)=>b.id-a.id);

let html="";

sessions.forEach(s=>{

html +=

`<div class="session"

onclick="restore(${s.id})">

Session ${new Date(s.id).toLocaleString()}

</div>`;

});

document.getElementById(
"sessions"
).innerHTML = html;

};

}


/* =====================================
RESTORE SESSION VIEW
===================================== */

function restore(id){

let tx =
db.transaction(
"sessions",
"readonly"
);

let store =
tx.objectStore("sessions");

let req =
store.get(id);

req.onsuccess = e => {

render(

e.target.result.data,
e.target.result.total

);

};

}


/* =====================================
SESSION LIMIT + AUTO ARCHIVE ENGINE
===================================== */

const SESSION_LIMIT = 3;


function enforceSessionLimit(){

let tx =
db.transaction(
["sessions","bin_db"],
"readwrite"
);

let store =
tx.objectStore("sessions");

let binStore =
tx.objectStore("bin_db");

let req =
store.getAll();


req.onsuccess = e => {

let sessions =
e.target.result
.sort((a,b)=>b.id-a.id);


if(sessions.length <= SESSION_LIMIT)
return;


let overflow =
sessions.slice(SESSION_LIMIT);


overflow.forEach(oldSession=>{

binStore.put({

id:oldSession.id,

total:oldSession.total,

entries:oldSession.data.length,

archivedAt:Date.now(),

accuracy:

Math.round(

(oldSession.total /

(oldSession.data.length*10))*100

)

});


store.delete(oldSession.id);


injectArchiveMeta(oldSession);

});

};

}


/* =====================================
ARCHIVE META GENERATOR
===================================== */

function injectArchiveMeta(session){

let accuracy =

Math.round(

(session.total /

(session.data.length*10))*100

);


let metaTags=[

{name:"anh-archive-session-id",content:session.id},

{name:"anh-archive-sites-count",content:session.data.length},

{name:"anh-archive-total-score",content:session.total},

{name:"anh-archive-accuracy",content:accuracy+"%"},

{name:"anh-archive-timestamp",

content:new Date(session.id).toISOString()},

{name:"anh-archive-generator",

content:"ANH ValidationSystem"},

{name:"anh-archive-type",

content:"session-analytics"},

{name:"anh-archive-status",

content:"archived-background"}

];


metaTags.forEach(tag=>{

let meta=document.createElement("meta");

meta.name=tag.name;

meta.content=tag.content;

document.head.appendChild(meta);

});

}

</script>
