<script>

/*
==============================
CONFIG
==============================
*/

const VAULT_PATH =
window.location.origin +
"/ValidationSystem/vault/alpha-vault.json";


/*
==============================
SMART SOURCE FETCH ENGINE
==============================
*/

async function fetchSource(url){

const proxies = [

"https://api.allorigins.win/raw?url=",
"https://corsproxy.io/?"

];

for(let proxy of proxies){

try{

let res = await fetch(proxy + encodeURIComponent(url));

if(res.ok){

return await res.text();

}

}catch{}

}

throw "Source fetch failed";

}


/*
==============================
EXTRACT SCRIPTO
==============================
*/

function extractScripto(source){

let match =
source.match(
/<script\s+class="Scripto">([\s\S]*?)<\/script>/i
);

return match ? match[1] : null;

}


/*
==============================
PARSE META OBJECT
==============================
*/

function parseMeta(script){

let url =
script.match(/url:"(.*?)"/);

let title =
script.match(/title:"(.*?)"/);

let description =
script.match(/description:"(.*?)"/);

let icon =
script.match(/icon:"(.*?)"/);

let id =
script.match(/ANH_ID="(.*?)"/);

return {

id:id?.[1],
url:url?.[1],
title:title?.[1],
description:description?.[1],
icon:icon?.[1]

};

}


/*
==============================
FETCH VAULT ENTRY
==============================
*/

async function fetchVaultEntry(id){

let response =
await fetch(VAULT_PATH);

let vault =
await response.json();

return vault.entries.find(
e => e.urlId === id
);

}


/*
==============================
COMPARE META
==============================
*/

function compareMeta(local, vault){

let result="";

for(let key of ["url","title","description","icon"]){

if(local[key]===vault[key]){

result+=`✔ ${key} match\n`;

}else{

result+=`✖ ${key} mismatch\n`;

}

}

return result;

}


/*
==============================
TIER BADGE ENGINE
==============================
*/

function tierBadge(tier){

if(tier==="TIER-1") return "tier1";
if(tier==="TIER-2") return "tier2";
return "tier3";

}


/*
==============================
MAIN ENGINE
==============================
*/

async function inspectPage(){

let url=document.getElementById("url").value;

if(!url){

alert("Enter URL");

return;

}


document.getElementById("status").innerText =
"Fetching page source...";


try{

let source =
await fetchSource(url);


let scripto =
extractScripto(source);


if(!scripto){

document.getElementById("status").innerText =
"No Scripto script detected";

return;

}


document.getElementById("scripto").innerText =
scripto;


let meta =
parseMeta(scripto);


document.getElementById("status").innerText =
"Scripto detected → " + meta.id;


let entry =
await fetchVaultEntry(meta.id);


if(!entry){

document.getElementById("vault").innerText =
"No vault entry found";

return;

}


document.getElementById("vault").innerText =
JSON.stringify(entry,null,2);


let comparison =
compareMeta(meta,entry);


document.getElementById("comparison").innerText =
comparison;


document.getElementById("status").innerHTML +=
`<br><span class="${tierBadge(entry.tier)}">
Trust Level: ${entry.tier}
</span>`;


}catch(e){

document.getElementById("status").innerText =
"Inspection failed (CORS or proxy blocked)";

console.warn(e);

}

}

</script>
